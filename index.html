<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO'Lyfe Deal OS</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="app">

<h1>🏡 RO’Lyfe Deal OS</h1>
<p class="sub">Analyze → Lock → Sign → Send → Close</p>

<!-- VIDEO TRAINING -->
<div class="card">
<iframe src="https://www.youtube.com/embed/iAlUx755K2s"></iframe>
</div>

<!-- DEAL INPUT -->
<div class="card">
<input id="address" placeholder="Property Address">
<div class="row">
<button onclick="openZillow()">Zillow</button>
<button onclick="openRedfin()">Redfin</button>
<button onclick="openUSDA()">USDA</button>
</div>

<input id="arv" placeholder="ARV">
<input id="price" placeholder="Purchase Price">
<input type="date" id="closing">

<button onclick="analyzeDeal()">Analyze Deal</button>
<button onclick="resetDeal()">Reset</button>
</div>

<!-- RESULT -->
<div class="card" id="result">Ready...</div>

<!-- 3 TIER -->
<div class="card">
<h3>📊 3 Tier Engine</h3>
<input id="tierArv" placeholder="Enter ARV">
<button onclick="run3Tier()">Run</button>
<div id="tierOut"></div>
</div>

<!-- REPAIRS -->
<div class="card">
<h3>🏗️ Repairs</h3>
<input id="r1" placeholder="Roof">
<input id="r2" placeholder="Electrical">
<input id="r3" placeholder="Plumbing">
<input id="r4" placeholder="Interior">
<button onclick="calcRepairs()">Calculate</button>
<div id="repairOut"></div>
</div>

<!-- SIGNATURE -->
<div class="card">
<h3>✍️ Signature</h3>
<canvas id="sig"></canvas>
<button onclick="clearSig()">Clear</button>
</div>

<!-- CLOSE MODE -->
<div class="card">
<h3>🚀 Close Mode</h3>
<button onclick="copyDeal()">Copy Deal</button>
<button onclick="emailDeal()">Email</button>
<button onclick="textDeal()">Text</button>
<button onclick="oneClickClose()">🔥 ONE CLICK CLOSE</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
